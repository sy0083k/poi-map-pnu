name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend typecheck and build
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
          npm ci
          npm run typecheck
          npm run build

      - name: Verify Vite manifest
        run: scripts/verify_vite_manifest.sh

      - name: Python checks
        run: |
          python -m compileall -q app tests
          mypy app tests create_hash.py
          pip install ruff xenon
          ruff check app tests
          scripts/check_quality_warnings.sh
          pytest -q -m unit
          pytest -q -m integration
          pytest -q -m e2e
          pytest -q

      - name: Coverage fresh run and path validation
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          pip install coverage
          scripts/run_coverage.sh
          coverage debug data > /tmp/coverage-debug-data.txt
          python - <<'PY'
          import os
          import re
          import sys

          workspace = os.environ["WORKSPACE"].rstrip("/")
          bad_paths = []
          with open("/tmp/coverage-debug-data.txt", encoding="utf-8") as handle:
              for raw_line in handle:
                  line = raw_line.strip()
                  match = re.match(r"^(/.*):\s+\d+\s+lines$", line)
                  if not match:
                      continue
                  file_path = match.group(1)
                  if not file_path.startswith(f"{workspace}/"):
                      bad_paths.append(file_path)

          if bad_paths:
              print("coverage data contains files outside workspace:")
              for path in bad_paths:
                  print(f"- {path}")
              sys.exit(1)

          print("coverage data path validation passed")
          PY
