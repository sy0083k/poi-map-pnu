name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend typecheck and build
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
          npm ci
          npm run typecheck
          npm run build

      - name: Verify Vite manifest
        run: scripts/verify_vite_manifest.sh

      - name: Python checks
        run: |
          python -m compileall -q app tests
          mypy app tests create_hash.py
          pytest -q
