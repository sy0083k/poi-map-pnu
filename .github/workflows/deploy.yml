name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
          npm ci
          npm run build

      - name: Verify Vite manifest exists
        run: scripts/verify_vite_manifest.sh

      - name: Deploy application
        run: |
          echo "TODO: add your deployment command (ssh/rsync/container rollout)."
