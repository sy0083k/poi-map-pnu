[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "-q"
testpaths = ["tests"]
norecursedirs = ["IdlePublicProperty", ".git", ".venv", "venv", "node_modules"]
markers = [
    "unit: fast unit-style tests for pure logic/services/repositories",
    "integration: API/ASGI/DB integration tests",
    "e2e: end-to-end smoke tests requiring explicit runtime opt-in",
]

[tool.coverage.run]
branch = true
source = ["app"]

[tool.coverage.report]
fail_under = 70
show_missing = true

[tool.mypy]
python_version = "3.12"
files = ["app", "tests", "create_hash.py"]
warn_return_any = false
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
disallow_incomplete_defs = false
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
ignore_errors = true

[[tool.mypy.overrides]]
module = ["requests", "pandas", "flatgeobuf"]
ignore_missing_imports = true
