<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ request.app.state.config.APP_NAME }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.15.1/css/ol.css">   
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <div id="sidebar">
        <div class="mobile-handle"></div>
        
        <div id="header">
            <h2 style="margin:0; font-size: 1.2em;">{{ request.app.state.config.APP_NAME }}</h2>
            <p style="margin:5px 0 0; font-size: 0.8em; opacity: 0.8;">공유재산 필지 검색 서비스</p>
        </div>
        <div id="filter-section">
			<div class="checkbox-group">
                <input type="checkbox" id="rent-only-filter" onchange="applyFilters()" checked>
                <label for="rent-only-filter">사용허가/대부 불가 토지 제외</label>
            </div>
            <div class="filter-group">
                <label>지역명 검색 (예: 대산읍, 동문동)</label>
                <input type="text" id="region-search" placeholder="읍/면/동 이름을 입력하세요..." 
					style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="filter-group">
                <label>면적 직접 입력 (㎡)</label>
                <div class="area-input-container">
                    <input type="number" id="min-area" placeholder="최소" min="0">
                    <span>~</span>
                    <input type="number" id="max-area" placeholder="최대" min="0">
                </div>
            </div>
            <button id="btn-search" onclick="applyFilters()">조건에 맞는 토지 찾기</button>
        </div>
        <div id="list-container">
            <p style="padding: 20px; color: #999;">데이터 로딩 중...</p>
        </div>
        <div id="nav-footer">
            <button class="nav-btn" id="prev-btn" onclick="navigateItem(-1)" disabled>◀ 이전</button>
            <span id="nav-info">0 / 0</span>
            <button class="nav-btn" id="next-btn" onclick="navigateItem(1)" disabled>다음 ▶</button>
        </div>
    </div>

    <div id="map">
        <div class="map-controls">
            <button id="btn-Base" class="active" onclick="changeLayer('Base')">일반 지도</button>
            <button id="btn-Satellite" onclick="changeLayer('Satellite')">위성 지도</button>
            <button id="btn-Hybrid" onclick="changeLayer('Hybrid')">하이브리드</button>
        </div>
    </div>

    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer">✖</a>
        <div id="popup-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.15.1/build/ol.js"></script>
    <script src="{{ url_for('static', path='js/map.js') }}"></script>
</body>
</html>
