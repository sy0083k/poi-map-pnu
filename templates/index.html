<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ request.app.state.config.APP_NAME }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <button id="mobile-search-fab" class="mobile-icon-btn" type="button" aria-label="검색 열기">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="10.5" cy="10.5" r="5.5"></circle>
            <path d="M15 15L20 20"></path>
        </svg>
        <span class="sr-only">검색 열기</span>
    </button>

    <div id="mobile-search-overlay" aria-hidden="true">
        <div class="mobile-search-sheet">
            <div class="mobile-search-header">
                <h3>조건 검색</h3>
                <button id="mobile-search-close" type="button" aria-label="검색 닫기">✕</button>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="mobile-rent-only-filter" checked>
                <label for="mobile-rent-only-filter">사용허가/대부 불가 토지 제외</label>
            </div>
            <div class="filter-group">
                <label>지역명 검색 (예: 대산읍, 동문동)</label>
                <input
                    type="text"
                    id="mobile-region-search"
                    placeholder="읍/면/동 이름을 입력하세요..."
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;"
                >
            </div>
            <div class="filter-group">
                <label>면적 직접 입력 (㎡)</label>
                <div class="area-input-container">
                    <input type="number" id="mobile-min-area" placeholder="최소" min="0">
                    <span>~</span>
                    <input type="number" id="mobile-max-area" placeholder="최대" min="0">
                </div>
            </div>
            <div class="action-cluster mobile-search-actions" role="group" aria-label="모바일 검색 작업">
                <button id="mobile-btn-search" type="button">검색 실행</button>
                <button id="mobile-btn-reset-filters" class="btn-secondary" type="button">조건 초기화</button>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="mobile-handle"></div>
        
        <div id="header">
            <h2 style="margin:0; font-size: 1.2em;">{{ request.app.state.config.APP_NAME }}</h2>
            <p style="margin:5px 0 0; font-size: 0.8em; opacity: 0.8;">공유재산 필지 검색 서비스</p>
        </div>
        <div id="filter-section">
			<div class="checkbox-group">
                <input type="checkbox" id="rent-only-filter" checked>
                <label for="rent-only-filter">사용허가/대부 불가 토지 제외</label>
            </div>
            <div class="filter-group">
                <label>지역명 검색 (예: 대산읍, 동문동)</label>
                <input type="text" id="region-search" placeholder="읍/면/동 이름을 입력하세요..." 
					style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="filter-group">
                <label>면적 직접 입력 (㎡)</label>
                <div class="area-input-container">
                    <input type="number" id="min-area" placeholder="최소" min="0">
                    <span>~</span>
                    <input type="number" id="max-area" placeholder="최대" min="0">
                </div>
            </div>
            <button id="btn-search">조건에 맞는 토지 찾기</button>
            <div class="action-cluster" role="group" aria-label="검색 옵션 작업">
                <button id="btn-reset-filters" class="btn-secondary" type="button">검색 조건 초기화</button>
                <button id="btn-download-all" class="btn-secondary" type="button">전체 목록 다운로드</button>
            </div>
        </div>
        <div id="list-container">
            <p style="padding: 20px; color: #999;">데이터 로딩 중...</p>
        </div>
        <div id="nav-footer">
            <button class="nav-btn" id="prev-btn" disabled>◀ 이전</button>
            <span id="nav-info">0 / 0</span>
            <button class="nav-btn" id="next-btn" disabled>다음 ▶</button>
        </div>
    </div>

    <div id="map">
        <div class="map-controls">
            <button id="btn-layer-toggle" class="layer-mobile-toggle mobile-icon-btn" type="button" aria-label="레이어 선택" aria-haspopup="true" aria-expanded="false" aria-controls="layer-popover">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 4L20 8L12 12L4 8Z"></path>
                    <path d="M4 12L12 16L20 12"></path>
                    <path d="M4 16L12 20L20 16"></path>
                </svg>
                <span class="sr-only">레이어 선택</span>
            </button>
            <div id="layer-popover" class="layer-popover" role="menu" aria-hidden="true">
                <button id="m-btn-Base" type="button" role="menuitem">일반 지도</button>
                <button id="m-btn-Satellite" type="button" role="menuitem">위성 지도</button>
                <button id="m-btn-Hybrid" type="button" role="menuitem">하이브리드</button>
            </div>
            <button id="btn-Base" class="layer-desktop active">일반 지도</button>
            <button id="btn-Satellite" class="layer-desktop">위성 지도</button>
            <button id="btn-Hybrid" class="layer-desktop">하이브리드</button>
        </div>
    </div>

    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer">✖</a>
        <div id="popup-content"></div>
    </div>

    {% set assets = vite_assets('src/map.ts') %}
    {% for css_file in assets.css %}
    <link rel="stylesheet" href="{{ css_file }}">
    {% endfor %}
    <script type="module" src="{{ assets.js }}"></script>
</body>
</html>
