<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ request.app.state.config.APP_NAME }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body data-initial-theme="{{ initial_theme|default('national_public') }}">
    {% include "partials/topbar.html" %}

    <div id="ui-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <div id="app-shell">
    <button id="sidebar-handle" type="button" aria-expanded="true" aria-controls="sidebar" aria-label="사이드 메뉴 접기/펼치기"></button>
    <button id="mobile-search-fab" class="mobile-icon-btn" type="button" aria-label="검색 열기">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="10.5" cy="10.5" r="5.5"></circle>
            <path d="M15 15L20 20"></path>
        </svg>
        <span class="sr-only">검색 열기</span>
    </button>

    <div id="mobile-search-overlay" aria-hidden="true">
        <div class="mobile-search-sheet">
            <div class="mobile-search-header">
                <h3>조건 검색</h3>
                <button id="mobile-search-close" type="button" aria-label="검색 닫기">✕</button>
            </div>
            <div class="filter-group">
                <label>지역명 검색 (예: 대산읍, 동문동)</label>
                <input
                    type="text"
                    id="mobile-region-search"
                    placeholder="읍/면/동 이름을 입력하세요..."
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;"
                >
            </div>
            <div class="filter-group">
                <label>면적 직접 입력 (㎡)</label>
                <div class="area-input-container">
                    <input type="number" id="mobile-min-area" placeholder="최소" min="0">
                    <span>~</span>
                    <input type="number" id="mobile-max-area" placeholder="최대" min="0">
                </div>
            </div>
            <div class="filter-group theme-city-only">
                <label>재산관리관 (예: 회계과)</label>
                <input
                    type="text"
                    id="mobile-property-manager-search"
                    placeholder="재산관리관 이름을 입력하세요..."
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;"
                >
            </div>
            <div class="action-cluster mobile-search-actions" role="group" aria-label="모바일 검색 작업">
                <button id="mobile-btn-search" type="button">검색 실행</button>
                <button id="mobile-btn-reset-filters" class="btn-secondary" type="button">조건 초기화</button>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="mobile-handle"></div>
        <div id="filter-section">
            <div class="filter-group">
                <label>지역명 검색 (예: 대산읍, 동문동)</label>
                <input type="text" id="region-search" placeholder="읍/면/동 이름을 입력하세요..." 
					style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="filter-group">
                <label>면적 직접 입력 (㎡)</label>
                <div class="area-input-container">
                    <input type="number" id="min-area" placeholder="최소" min="0">
                    <span>~</span>
                    <input type="number" id="max-area" placeholder="최대" min="0">
                </div>
            </div>
            <div class="filter-group theme-city-only">
                <label>재산관리관 (예: 회계과)</label>
                <input
                    type="text"
                    id="property-manager-search"
                    placeholder="재산관리관 이름을 입력하세요..."
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;"
                >
            </div>
            <button id="btn-search">조건에 맞는 토지 찾기</button>
            <div class="action-cluster" role="group" aria-label="검색 옵션 작업">
                <button id="btn-reset-filters" class="btn-secondary" type="button">검색 조건 초기화</button>
                <button id="btn-download-all" class="btn-secondary" type="button">검색 결과 다운로드</button>
            </div>
        </div>
        <div id="list-container">
            <p style="padding: 20px; color: #999;">데이터 로딩 중...</p>
        </div>
        <div id="nav-footer">
            <button class="nav-btn" id="prev-btn" disabled>◀ 이전</button>
            <span id="nav-info">0 / 0</span>
            <button class="nav-btn" id="next-btn" disabled>다음 ▶</button>
        </div>
    </div>

    <div id="map">
        <div id="map-status" class="is-hidden" role="status" aria-live="polite">
            <span id="map-status-text"></span>
            <button id="map-status-close" type="button" aria-label="상태 메시지 닫기">✕</button>
        </div>
    </div>

    <aside id="land-info-panel" class="is-hidden" aria-live="polite" aria-label="선택 토지 상세 정보">
        <header class="land-info-header">
            <h3>상세 정보</h3>
            <button id="land-info-close" class="land-info-close" type="button" aria-label="상세 정보 닫기">✕</button>
        </header>
        <div id="land-info-content" class="land-info-content">
            <div class="land-info-empty">토지를 선택하면 상세 정보가 표시됩니다.</div>
        </div>
    </aside>
    </div>

    {% set assets = vite_assets('src/map.ts') %}
    {% for css_file in assets.css %}
    <link rel="stylesheet" href="{{ css_file }}">
    {% endfor %}
    <script type="module" src="{{ assets.js }}"></script>
</body>
</html>
