<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지</title>
    <style>
        /* 기존 스타일 그대로 유지 */
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .admin-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input[type="file"] { margin: 20px 0; border: 1px solid #ddd; padding: 10px; width: 100%; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 10px; }
        button:hover { background: #2980b9; }
        
        #status { margin-top: 20px; font-size: 14px; white-space: pre-line; }
    </style>
</head>
<body>
    <div class="admin-card">
        <div style="text-align: right;"><a href="/logout" style="font-size: 12px; color: #666;">로그아웃</a></div>
        <h2>📊 관리자 페이지</h2>
        <p>최신 유휴재산 엑셀 파일을 업로드하세요.</p>
        
        <input type="hidden" id="csrfToken" value="{{ csrf_token }}">
        <input type="file" id="excelFile" accept=".xlsx">
        <button onclick="handleUpload()">DB 업데이트 시작</button>
               
        <div id="status"></div>
    </div>

	<script>
        const csrfToken = document.getElementById('csrfToken').value;
        
        async function handleUpload() {
            const fileInput = document.getElementById('excelFile');
            if (!fileInput.files[0]) return alert("파일을 선택해주세요.");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('csrf_token', csrfToken);

            const status = document.getElementById('status');
            
            status.style.color = "black";            

            try {
				// --- [STEP 1: 엑셀 업로드] ---
				status.innerText = "1단계: 엑셀 파일 입력 중...";
				const res = await fetch('/admin/upload', { method: 'POST', body: formData });
				const result = await res.json(); // result로 통일
				
				if (!res.ok || !result.success) throw new Error(result.message || "업로드 실패");

				// 최종 결과 표시 (백그라운드에서 돌고 있으므로 완료 문구 표시)
				status.style.color = "green";
				status.innerText = "✅ " + result.message;
				alert("서버에서 데이터 처리를 시작했습니다.\n이제 이 창을 닫으셔도 작업은 중단되지 않습니다.");
			
            } catch (e) {
                status.style.color = "red";
                status.innerText = "오류 발생: " + e;
            }
        }
    </script>
</body>
</html>
