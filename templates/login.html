<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 관리자 로그인</h2>
        <form id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
        <p id="msg" style="color:red; font-size:12px;"></p>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault(); // 폼의 기본 제출 동작 막기

            const formData = new FormData(e.target);
            const msg = document.getElementById('msg');

            try {
                // 1. 서버로 데이터 전송
                const res = await fetch('/login', { // 주의: auth.py의 라우트와 일치해야 함 (/api/login 인지 /login 인지 확인)
                    method: 'POST', 
                    body: formData 
                });
                
                // 2. 응답 JSON 해석
                const result = await res.json();

                // 3. 성공 시 페이지 이동 (여기서 이동합니다!)
                if (res.ok && result.success) {
                    window.location.href = '/admin'; 
                } else {
                    // 실패 시 에러 메시지 출력
                    msg.innerText = result.message || "로그인 실패";
                }
            } catch (err) {
                console.error(err);
                msg.innerText = "서버 통신 오류가 발생했습니다.";
            }
        };
    </script>
</body>
</html>
