services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: idle-public-property:latest
    container_name: idle-public-property-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SESSION_HTTPS_ONLY: "false"
      TRUST_PROXY_HEADERS: "false"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
